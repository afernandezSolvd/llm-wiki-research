services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: llmwiki
      POSTGRES_PASSWORD: llmwiki
      POSTGRES_DB: llmwiki
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmwiki"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - wiki_repos:/app/wiki_repos
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://llmwiki:llmwiki@db:5432/llmwiki
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q ingest,lint,embedding,graph,default
    volumes:
      - .:/app
      - wiki_repos:/app/wiki_repos
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://llmwiki:llmwiki@db:5432/llmwiki
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis

  flower:
    build: .
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis

volumes:
  pgdata:
  wiki_repos:
